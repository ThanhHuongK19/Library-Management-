<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chỉnh Sửa Sách</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="max-w-xl w-full bg-white rounded-2xl shadow-md p-8 border border-gray-100 my-10">
    <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">Cập Nhật Thông Tin Sách</h2>
    <p class="text-xs text-gray-400 text-center mb-6">Chỉnh sửa các trường cần thay đổi (PATCH Mode)</p>

    <div th:if="${errorMessage}" class="mb-4 bg-red-50 border border-red-200 text-red-600 p-3 rounded-lg text-sm" th:text="${errorMessage}"></div>

    <form th:action="@{/books/edit/{id}(id=${bookId})}" th:object="${updateBookRequest}" method="post" class="space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tiêu đề sách</label>
            <input type="text" th:field="*{title}" class="w-full px-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-gray-800"/>
            <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-xs text-red-500 mt-1"></p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tác giả</label>
                <input type="text" th:field="*{author}" class="w-full px-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-gray-800"/>
                <p th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="text-xs text-red-500 mt-1"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mã ISBN <span class="text-red-500">*</span></label>
                <input type="text" th:field="*{isbn}" required class="w-full px-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 bg-gray-50"/>
                <p th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="text-xs text-red-500 mt-1"></p>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Danh mục thể loại</label>
            <select th:field="*{categoryId}" class="w-full px-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-800">
                <option value="">-- Chọn danh mục --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.categoryId}"
                        th:text="${cat.categoryName}"></option>
            </select>
            <p th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" class="text-xs text-red-500 mt-1"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Số lượng kho</label>
            <input type="number" th:field="*{quantity}" min="0" class="w-full px-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-gray-800"/>
            <p th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class="text-xs text-red-500 mt-1"></p>
        </div>

        <div class="flex gap-4 pt-4 border-t border-gray-100">
            <a th:href="@{/books}" class="w-1/2 text-center bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 rounded-xl transition flex items-center justify-center">Quay lại</a>
            <button type="submit" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl shadow-sm transition">Cập nhật ngay</button>
        </div>
    </form>
</div>

</body>
</html>
