<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Thư Viện</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Chào mừng trở lại</h2>
        <p class="text-sm text-gray-500 mt-2">Vui lòng đăng nhập tài khoản thư viện của bạn</p>
    </div>

    <div th:if="${errorMessage}" class="mb-4 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
        <span th:text="${errorMessage}">Tên đăng nhập hoặc mật khẩu không đúng</span>
    </div>

    <form th:action="@{/login}" th:object="${loginRequest}" method="POST" class="space-y-6">

        <div>
            <label class="block text-sm font-medium text-gray-700">Tên đăng nhập</label>
            <input type="text" th:field="*{username}" required class="w-full px-4 py-3 border rounded-xl"/>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Mật khẩu</label>
            <input type="password" th:field="*{password}" required class="w-full px-4 py-3 border rounded-xl"/>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold">
            Đăng nhập
        </button>
    </form>

    <div class="text-center mt-6">
        <p class="text-sm text-gray-600">
            Chưa có tài khoản?
            <a th:href="@{/register}" class="text-blue-600 hover:underline font-medium">Đăng ký ngay</a>
        </p>
        <p class="text-xs text-gray-400 mt-4">
            <a th:href="@{/home}" class="hover:text-gray-600 transition">← Quay lại trang chủ</a>
        </p>
    </div>
</div>

</body>
</html>
